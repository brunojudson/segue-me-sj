<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<ui:composition template="/templates/template.xhtml">
	<ui:define name="content">
		<div class="content-container">
			<div class="form-container">
				<h2 class="form-title">Detalhes do Casal</h2>

				<h:form id="visualizarForm">
					<f:metadata>
						<f:viewParam name="id" />
						<f:viewAction action="#{casalController.carregarCasal}"
							if="#{not empty param.id}" />
					</f:metadata>

					<div class="form-content">
						<!-- Atributos do casal -->
						<div class="form-details">
							<p:panelGrid columns="2" layout="grid"
								styleClass="ui-panelgrid-blank ui-fluid"
								columnClasses="ui-grid-col-4, ui-grid-col-8">

								<p:outputLabel value="Esposo:" />
								<h:outputText value="#{casalController.casal.pessoa1.nome}" />

								<p:outputLabel value="Telefone do Esposo:" />
								<h:outputText value="#{casalController.casal.pessoa1.telefone}" />

								<p:outputLabel value="Esposa:" />
								<h:outputText value="#{casalController.casal.pessoa2.nome}" />

								<p:outputLabel value="Telefone da Esposa:" />
								<h:outputText value="#{casalController.casal.pessoa2.telefone}" />

								<p:outputLabel value="Data de Casamento:" />
								<h:outputText value="#{casalController.casal.dataCasamento}">
									<f:converter converterId="localDateConverter" />
								</h:outputText>

								<p:outputLabel value="Observações:" />
								<h:outputText value="#{casalController.casal.observacoes}" />
							</p:panelGrid>
						</div>

						<!-- Foto do casal -->
						<div class="form-photo">
							<p:graphicImage value="#{casalController.foto}"
								alt="Foto do Casal" style="max-width: 200px; max-height: 200px;" />
						</div>
					</div>

					<div class="form-buttons">
						<p:commandButton value="Gerar Ficha"
							styleClass="ui-button-success" ajax="false"
							action="#{casalController.gerarFichaInscricao(casalController.casal)}" />
						<p:button value="Editar" outcome="/pages/casal/cadastro.xhtml"
							icon="pi pi-pencil" styleClass="ui-button-warning">
							<f:param name="id" value="#{casalController.casal.id}" />
						</p:button>

						<p:button value="Voltar" outcome="/pages/casal/lista.xhtml"
							icon="pi pi-arrow-left" styleClass="ui-button-secondary" />
					</div>
				</h:form>
			</div>
		</div>
	</ui:define>
</ui:composition>

</html>
