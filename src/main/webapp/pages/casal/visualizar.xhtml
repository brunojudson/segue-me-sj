<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	lang="pt-BR" xml:lang="pt-BR">

<ui:define name="title">Visualizar Casal - #{casalController.casal.pessoa1.nome} e #{casalController.casal.pessoa2.nome}</ui:define>

<ui:composition template="/templates/template.xhtml">
	<ui:define name="content">
		<div class="content-container page-enter">
			<h:form id="visualizarForm">
				<f:metadata>
					<f:viewParam name="id" />
					<f:viewAction action="#{casalController.carregarCasal}" if="#{not empty param.id}" />
				</f:metadata>

				<!-- Header -->
				<div class="detail-page-header anim-fade-in">
					<div class="detail-header-left">
						<p:link outcome="/pages/casal/lista.xhtml" styleClass="btn-icon" title="Voltar">
							<i class="pi pi-arrow-left"></i>
						</p:link>
						<div>
							<h1><i class="pi pi-heart page-icon"></i> #{casalController.casal.pessoa1.nome} &amp; #{casalController.casal.pessoa2.nome}</h1>
							<p class="subtitle">Casal</p>
						</div>
					</div>
					<div class="detail-header-right">
						<h:panelGroup rendered="#{casalController.casal.dataCasamento != null}">
							<span class="sm-tag sm-tag-green">
								<h:outputText value="#{casalController.casal.dataCasamento}">
									<f:converter converterId="localDateConverter" />
								</h:outputText>
							</span>
						</h:panelGroup>
						<p:button value="Editar" outcome="/pages/casal/cadastro.xhtml" icon="pi pi-pencil" styleClass="action-button-primary">
							<f:param name="id" value="#{casalController.casal.id}" />
						</p:button>
					</div>
				</div>

				<!-- Cards dos Cônjuges -->
				<div class="spouse-cards anim-fade-in-d1">
					<div class="spouse-card">
						<div class="spouse-title"><i class="pi pi-user"></i> Esposo</div>
						<div class="spouse-name">
							<h:outputText value="#{casalController.casal.pessoa1.nome}" rendered="#{casalController.casal.pessoa1 != null}" />
							<h:outputText value="Não informado" rendered="#{casalController.casal.pessoa1 == null}" styleClass="empty-value" />
						</div>
						<div class="spouse-phone">
							<i class="pi pi-phone"></i>
							<h:outputText value="#{casalController.casal.pessoa1.telefone}" rendered="#{casalController.casal.pessoa1 != null and not empty casalController.casal.pessoa1.telefone}" />
							<h:outputText value="Não informado" rendered="#{casalController.casal.pessoa1 == null or empty casalController.casal.pessoa1.telefone}" styleClass="empty-value" />
						</div>
					</div>
					<div class="spouse-card">
						<div class="spouse-title"><i class="pi pi-user"></i> Esposa</div>
						<div class="spouse-name">
							<h:outputText value="#{casalController.casal.pessoa2.nome}" rendered="#{casalController.casal.pessoa2 != null}" />
							<h:outputText value="Não informado" rendered="#{casalController.casal.pessoa2 == null}" styleClass="empty-value" />
						</div>
						<div class="spouse-phone">
							<i class="pi pi-phone"></i>
							<h:outputText value="#{casalController.casal.pessoa2.telefone}" rendered="#{casalController.casal.pessoa2 != null and not empty casalController.casal.pessoa2.telefone}" />
							<h:outputText value="Não informado" rendered="#{casalController.casal.pessoa2 == null or empty casalController.casal.pessoa2.telefone}" styleClass="empty-value" />
						</div>
					</div>
				</div>

				<!-- Informações + Foto -->
				<div class="detail-grid anim-fade-in-d2">
					<div class="detail-section">
						<h3 class="detail-section-title"><i class="pi pi-info-circle"></i> Informações</h3>
						<div class="info-grid">
							<div class="info-item">
								<label>Data de Casamento</label>
								<span>
									<h:outputText value="#{casalController.casal.dataCasamento}" rendered="#{casalController.casal.dataCasamento != null}">
										<f:converter converterId="localDateConverter" />
									</h:outputText>
									<h:outputText value="Não informado" rendered="#{casalController.casal.dataCasamento == null}" styleClass="empty-value" />
								</span>
							</div>
							<div class="info-item full-width">
								<label>Observações</label>
								<span>
									<h:outputText value="#{casalController.casal.observacoes}" rendered="#{not empty casalController.casal.observacoes}" />
									<h:outputText value="Sem observações" rendered="#{empty casalController.casal.observacoes}" styleClass="empty-value" />
								</span>
							</div>
						</div>
					</div>

					<div class="detail-section" style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem;">
						<p:graphicImage value="#{casalController.foto}" alt="Foto do Casal"
							style="max-width:200px; max-height:200px; border-radius:12px; object-fit:cover;"
							rendered="#{casalController.foto != null}" />
						<h:panelGroup rendered="#{casalController.foto == null}">
							<div class="foto-placeholder-lg">
								<i class="pi pi-heart"></i>
							</div>
						</h:panelGroup>
					</div>
				</div>

				<!-- Ações -->
				<div class="view-action-buttons anim-fade-in-d3">
					<p:commandButton value="Gerar Ficha" icon="pi pi-file-pdf"
						styleClass="ui-button-success" ajax="false"
						action="#{casalController.gerarFichaInscricao(casalController.casal)}" />
					<p:button value="Voltar" outcome="/pages/casal/lista.xhtml" icon="pi pi-arrow-left" styleClass="ui-button-secondary" />
				</div>
			</h:form>
		</div>
	</ui:define>
</ui:composition>

</html>
