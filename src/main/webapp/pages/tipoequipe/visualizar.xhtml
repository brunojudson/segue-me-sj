<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="/templates/template.xhtml">
    <ui:define name="content">
        <div class="content-container">
            <div class="form-container">
                <h2 class="form-title">Detalhes do Tipo de Equipe</h2>
                
                <h:form id="visualizarForm">
                    <f:metadata>
                        <f:viewParam name="id" />
                        <f:viewAction action="#{tipoEquipeController.carregarTipoEquipe}" if="#{not empty param.id}" />
                    </f:metadata>
                    
                    <p:panelGrid columns="2" layout="grid" styleClass="ui-panelgrid-blank ui-fluid"
                                 columnClasses="ui-grid-col-4, ui-grid-col-8">
                        
                        <p:outputLabel value="ID:" />
                        <h:outputText value="#{tipoEquipeController.tipoEquipe.id}" />
                        
                        <p:outputLabel value="Nome:" />
                        <h:outputText value="#{tipoEquipeController.tipoEquipe.nome}" />
                        
                        <p:outputLabel value="Descrição:" />
                        <h:outputText value="#{tipoEquipeController.tipoEquipe.descricao}" />
                        
                        <p:outputLabel value="Equipe Dirigente:" />
                        <h:outputText value="#{tipoEquipeController.tipoEquipe.ehDirigente ? 'Sim' : 'Não'}" />
                        
                        <p:outputLabel value="Status:" />
                        <h:outputText value="#{tipoEquipeController.tipoEquipe.ativo ? 'Ativo' : 'Inativo'}" />
                        
                        <!-- <p:outputLabel value="Data de Cadastro:" />
                        <h:outputText value="#{tipoEquipeController.tipoEquipe.dataCadastro}">
                            <f:convertDateTime pattern="dd/MM/yyyy HH:mm:ss" />
                        </h:outputText> -->
                    </p:panelGrid>
                    
                    <div class="form-buttons">
                        <p:button value="Editar" outcome="/pages/tipoequipe/cadastro.xhtml" icon="pi pi-pencil" styleClass="ui-button-warning">
                            <f:param name="id" value="#{tipoEquipeController.tipoEquipe.id}" />
                        </p:button>
                        
                        <p:button value="Voltar" outcome="/pages/tipoequipe/lista.xhtml" icon="pi pi-arrow-left" 
                                  styleClass="ui-button-secondary" />
                    </div>
                </h:form>
            </div>
        </div>
    </ui:define>
</ui:composition>

</html>
