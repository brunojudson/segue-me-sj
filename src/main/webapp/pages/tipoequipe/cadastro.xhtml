<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="/templates/template.xhtml">
    <ui:define name="content">
        <div class="content-container">
            <div class="form-container">
                <h2 class="form-title">#{empty param.id ? 'Cadastrar' : 'Editar'} Tipo de Equipe</h2>
                
                <h:form id="tipoEquipeForm">
                    <p:messages id="messages" showDetail="true" closable="true">
                        <p:autoUpdate />
                    </p:messages>
                    
                    <f:metadata>
                        <f:viewParam name="id" />
                        <f:viewAction action="#{tipoEquipeController.carregarTipoEquipe}" if="#{not empty param.id}" />
                    </f:metadata>
                    
                    <p:panelGrid columns="2" layout="grid" styleClass="ui-panelgrid-blank ui-fluid"
                                 columnClasses="ui-grid-col-4, ui-grid-col-8">
                        
                        <p:outputLabel for="nome" value="Nome:" />
                        <p:inputText id="nome" value="#{tipoEquipeController.tipoEquipe.nome}" required="true" 
                                     requiredMessage="O nome é obrigatório" />
                        
                        <p:outputLabel for="descricao" value="Descrição:" />
                        <p:inputTextarea id="descricao" value="#{tipoEquipeController.tipoEquipe.descricao}" rows="3" />
                        
                        <p:outputLabel for="dirigente" value="Equipe Dirigente:" />
                        <p:selectBooleanCheckbox id="dirigente" value="#{tipoEquipeController.tipoEquipe.ehDirigente}" />
                        
                        <p:outputLabel for="ativo" value="Ativo:" />
                        <p:selectBooleanCheckbox id="ativo" value="#{tipoEquipeController.tipoEquipe.ativo}" />
                    </p:panelGrid>
                    
                    <div class="form-buttons">
                        <p:commandButton value="Salvar" action="#{tipoEquipeController.salvar}" icon="pi pi-save" 
                                         update="@form" styleClass="ui-button-success" />
                        
                        <p:button value="Cancelar" outcome="/pages/tipoequipe/lista.xhtml" icon="pi pi-times" 
                                  styleClass="ui-button-secondary" />
                    </div>
                </h:form>
            </div>
        </div>
    </ui:define>
</ui:composition>

</html>
