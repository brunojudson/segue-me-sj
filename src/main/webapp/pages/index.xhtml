<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="/templates/template.xhtml">
    <ui:define name="content">
        <div class="content-container">
            <div class="welcome-panel">
                <h2>Bem-vindo ao Sistema Segue-me</h2>
                <p>Sistema de gerenciamento para encontros de jovens</p>
                <!-- <div style="text-align: center; margin: 20px 0;">
                    <h:graphicImage library="images" name="segue-me.png" alt="Segue-me Logo" style="max-width: 100%; height: auto;" />
                </div> -->
                <p:panel header="Próximos Encontros" styleClass="dashboard-panel">
                    <p:dataTable id="encontrosTable" var="encontro" value="#{dashboardController.proximosEncontros}"
                                 emptyMessage="Nenhum encontro agendado" styleClass="data-table" reflow="true">
                        <p:column headerText="Nome">
                            <h:outputText value="#{encontro.nome}" />
                        </p:column>
                        <p:column headerText="Tema" sortBy="#{encontro.tema}">
							<h:outputText value="#{encontro.tema}" />
						</p:column>
                        <p:column headerText="Data Início">
                            <h:outputText value="#{encontro.dataInicio}">
                                 <f:converter converterId="localDateConverter" />
                            </h:outputText>
                        </p:column>
                        <p:column headerText="Data Fim">
                            <h:outputText value="#{encontro.dataFim}">
                                 <f:converter converterId="localDateConverter" />
                            </h:outputText>
                        </p:column>
                        <p:column headerText="Local">
                            <h:outputText value="#{encontro.local}" />
                        </p:column>
                        <p:column headerText="Ações" styleClass="action-column">
                            <p:button value="Detalhes" outcome="/pages/encontro/visualizar.xhtml" icon="pi pi-search">
                                <f:param name="id" value="#{encontro.id}" />
                            </p:button>
                        </p:column>
                    </p:dataTable>
                </p:panel>
                
                <p:panel header="Estatísticas dos Encontros" styleClass="dashboard-panel">
                    <div class="ui-g dashboard-stats">
                        <div class="ui-g-12 ui-md-3">
                            <div class="stat-card">
                                <div class="stat-title">Encontristas</div>
                                <div class="stat-value">#{dashboardController.totalEncontristas}</div>
                            </div>
                        </div>
                        <div class="ui-g-12 ui-md-3">
                            <div class="stat-card">
                                <div class="stat-title">Trabalhadores</div>
                                <div class="stat-value">#{dashboardController.totalTrabalhadores}</div>
                            </div>
                        </div>
                        <div class="ui-g-12 ui-md-3">
                            <div class="stat-card">
                                <div class="stat-title">Equipes</div>
                                <div class="stat-value">#{dashboardController.totalEquipes}</div>
                            </div>
                        </div>
                        <div class="ui-g-12 ui-md-3">
                            <div class="stat-card">
                                <div class="stat-title">Contribuições</div>
                                <div class="stat-value">R$ #{dashboardController.totalContribuicoes}</div>
                            </div>
                        </div>
                    </div>
                </p:panel>
            </div>
        </div>
    </ui:define>
</ui:composition>

</html>
