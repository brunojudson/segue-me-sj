<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      lang="pt-BR" xml:lang="pt-BR">

<ui:define name="title">Visualizar Pasta - #{pastaController.pasta.nome}</ui:define>

<ui:composition template="/templates/template.xhtml">
    <ui:define name="content">
        <div class="content-container page-enter">
            <h:form id="visualizarForm">
                <f:metadata>
                    <f:viewParam name="id" />
                    <f:viewAction action="#{pastaController.carregarPasta}" if="#{not empty param.id}" />
                </f:metadata>

                <!-- Header -->
                <div class="detail-page-header anim-fade-in">
                    <div class="detail-header-left">
                        <p:link outcome="/pages/pasta/lista.xhtml" styleClass="btn-icon" title="Voltar">
                            <i class="pi pi-arrow-left"></i>
                        </p:link>
                        <div>
                            <h1><i class="pi pi-folder page-icon"></i>
                                <h:outputText value="#{pastaController.pasta.nome}"
                                              rendered="#{not empty pastaController.pasta.nome}" />
                                <h:outputText value="Pasta sem nome"
                                              rendered="#{empty pastaController.pasta.nome}" />
                            </h1>
                            <p class="subtitle">
                                <h:outputText value="Equipe: #{pastaController.pasta.equipe.nome}"
                                              rendered="#{not empty pastaController.pasta.equipe.nome}" />
                                <h:outputText value="Sem equipe definida"
                                              rendered="#{empty pastaController.pasta.equipe.nome}" />
                            </p>
                        </div>
                    </div>
                    <div class="detail-header-right">
                        <span class="sm-tag #{pastaController.pasta.ativo ? 'sm-tag-green' : 'sm-tag-red'}">
                            #{pastaController.pasta.ativo ? 'Ativo' : 'Inativo'}
                        </span>
                        <p:button value="Editar" outcome="/pages/pasta/cadastro.xhtml"
                                  icon="pi pi-pencil" styleClass="action-button-primary">
                            <f:param name="id" value="#{pastaController.pasta.id}" />
                        </p:button>
                    </div>
                </div>

                <!-- Informações -->
                <div class="detail-grid">
                    <!-- Informações Básicas -->
                    <div class="detail-section anim-fade-in-d1">
                        <h3 class="detail-section-title"><i class="pi pi-info-circle"></i> Informações Básicas</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <label>ID</label>
                                <span>#{pastaController.pasta.id}</span>
                            </div>
                            <div class="info-item">
                                <label>Nome</label>
                                <span>
                                    <h:outputText value="#{pastaController.pasta.nome}"
                                                  rendered="#{not empty pastaController.pasta.nome}" />
                                    <h:outputText value="Não informado" styleClass="empty-value"
                                                  rendered="#{empty pastaController.pasta.nome}" />
                                </span>
                            </div>
                            <div class="info-item">
                                <label>Equipe Dirigente</label>
                                <span>
                                    <h:outputText value="#{pastaController.pasta.equipe.nome}"
                                                  rendered="#{not empty pastaController.pasta.equipe.nome}" />
                                    <h:outputText value="Não informada" styleClass="empty-value"
                                                  rendered="#{empty pastaController.pasta.equipe.nome}" />
                                </span>
                            </div>
                            <div class="info-item full-width">
                                <label>Descrição</label>
                                <span>
                                    <h:outputText value="#{pastaController.pasta.descricao}"
                                                  rendered="#{not empty pastaController.pasta.descricao}" />
                                    <h:outputText value="Sem descrição" styleClass="empty-value"
                                                  rendered="#{empty pastaController.pasta.descricao}" />
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Período do Mandato -->
                    <div class="detail-section anim-fade-in-d2">
                        <h3 class="detail-section-title"><i class="pi pi-calendar"></i> Período do Mandato</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <label>Data de Início</label>
                                <span>
                                    <h:outputText value="#{pastaController.pasta.dataInicio}"
                                                  rendered="#{not empty pastaController.pasta.dataInicio}">
                                        <f:converter converterId="localDateConverter" />
                                    </h:outputText>
                                    <h:outputText value="Não informada" styleClass="empty-value"
                                                  rendered="#{empty pastaController.pasta.dataInicio}" />
                                </span>
                            </div>
                            <div class="info-item">
                                <label>Data de Fim</label>
                                <span>
                                    <h:outputText value="#{pastaController.pasta.dataFim}"
                                                  rendered="#{not empty pastaController.pasta.dataFim}">
                                        <f:converter converterId="localDateConverter" />
                                    </h:outputText>
                                    <h:outputText value="Não informada" styleClass="empty-value"
                                                  rendered="#{empty pastaController.pasta.dataFim}" />
                                </span>
                            </div>
                            <div class="info-item">
                                <label>Duração</label>
                                <span>
                                    <h:outputText value="#{pastaController.pasta.calcularDuracaoMandato()} dias"
                                                  rendered="#{pastaController.pasta.calcularDuracaoMandato() gt 0}" />
                                    <h:outputText value="Não calculável" styleClass="empty-value"
                                                  rendered="#{pastaController.pasta.calcularDuracaoMandato() le 0}" />
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Dirigentes -->
                <div class="detail-section anim-fade-in-d3" style="grid-column: 1 / -1;">
                    <h3 class="detail-section-title"><i class="pi pi-users"></i> Dirigentes da Pasta</h3>
                    <p:dataTable value="#{pastaController.pasta.dirigentes}" var="dirigente"
                                 emptyMessage="Nenhum dirigente cadastrado para esta pasta"
                                 styleClass="modern-datatable"
                                 paginator="true" rows="10" paginatorPosition="bottom">
                        <p:column headerText="Nome" sortBy="#{dirigente.trabalhador.pessoa.nome}">
                            <h:outputText value="#{dirigente.trabalhador.pessoa.nome}" />
                        </p:column>
                        <p:column headerText="Data de Início" sortBy="#{dirigente.dataInicio}">
                            <h:outputText value="#{dirigente.dataInicio}"
                                          rendered="#{not empty dirigente.dataInicio}">
                                <f:converter converterId="localDateConverter" />
                            </h:outputText>
                            <h:outputText value="Não informada" styleClass="empty-value"
                                          rendered="#{empty dirigente.dataInicio}" />
                        </p:column>
                        <p:column headerText="Data de Fim" sortBy="#{dirigente.dataFim}">
                            <h:outputText value="#{dirigente.dataFim}"
                                          rendered="#{not empty dirigente.dataFim}">
                                <f:converter converterId="localDateConverter" />
                            </h:outputText>
                            <h:outputText value="Em exercício" styleClass="empty-value"
                                          rendered="#{empty dirigente.dataFim}" />
                        </p:column>
                        <p:column headerText="Status" styleClass="text-center">
                            <span class="sm-tag #{dirigente.ativo ? 'sm-tag-green' : 'sm-tag-red'}">
                                <i class="pi #{dirigente.ativo ? 'pi-check' : 'pi-times'}"></i>
                                #{dirigente.ativo ? 'Ativo' : 'Inativo'}
                            </span>
                        </p:column>
                    </p:dataTable>
                </div>

                <!-- Ações -->
                <div class="view-action-buttons anim-fade-in-d4">
                    <p:button value="Editar" outcome="/pages/pasta/cadastro.xhtml"
                              icon="pi pi-pencil" styleClass="ui-button-warning">
                        <f:param name="id" value="#{pastaController.pasta.id}" />
                    </p:button>
                    <p:button value="Voltar" outcome="/pages/pasta/lista.xhtml"
                              icon="pi pi-arrow-left" styleClass="ui-button-secondary" />
                </div>
            </h:form>
        </div>
    </ui:define>
</ui:composition>

</html>
