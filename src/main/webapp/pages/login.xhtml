<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:p="http://primefaces.org/ui" lang="pt-BR" xml:lang="pt-BR">

<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistema Segue-me</title>
    <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css" />
    <h:outputScript library="primefaces" name="jquery/jquery.js" />
    <h:outputStylesheet library="css" name="login.css" />
    <link href="favicon.ico" rel="shortcut icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="true" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
</h:head>

<h:body class="login-page">
    <!-- Global Loader -->
    <div class="global-loader" style="display: none;" id="globalLoader">
        <div class="loader-content">
            <svg class="svg-spinner" width="32" height="32" viewBox="0 0 50 50" style="vertical-align: middle;"><circle cx="25" cy="25" r="20" fill="none" stroke="#1976d2" stroke-width="5" stroke-linecap="round" stroke-dasharray="31.4 31.4" transform="rotate(-90 25 25)"><animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/></circle></svg>
            <span>Carregando...</span>
        </div>
    </div>
    
    <div class="login-container">
        <div class="login-background">
            <div class="login-pattern"></div>
        </div>
        
        <div class="login-card" id="loginCard">
            <!-- Header do login -->
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-heart"></i>
                </div>
                <!-- <h1 class="login-title">Sistema Segue-me</h1> -->
                <p class="login-subtitle">Faça login para acessar o sistema</p>
            </div>

            <!-- Formulário -->
            <h:form class="login-form" id="loginForm">
                <p:tooltip />
                <p:focus for="username" />
                
                <p:messages id="messages" 
                           showDetail="true" 
                           closable="true" 
                           styleClass="login-messages" />

                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <p:inputText id="username" 
                                     value="#{loginController.email}" 
                                     placeholder="Digite seu usuário ou e-mail"
                                     styleClass="login-input"
                                     required="true"
                                     requiredMessage="Por favor, informe seu usuário" />
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <p:password id="password" 
                                    value="#{loginController.senha}" 
                                    placeholder="Digite sua senha"
                                    styleClass="login-input"
                                    required="true"
                                    requiredMessage="Por favor, informe sua senha"
                                    feedback="false"
                                    toggleMask="true" />
                    </div>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <p:selectBooleanCheckbox id="rememberMe" />
                        <h:outputLabel for="rememberMe" value="Lembrar-me" styleClass="remember-label" />
                    </div>
                </div>

                <p:commandButton value="Entrar" 
                                 action="#{loginController.login}" 
                                 update="messages"
                                 styleClass="login-button" 
                                 icon="fas fa-sign-in-alt"
                                 iconPos="right">
                    <p:ajax onstart="showLoginLoader()" oncomplete="hideLoginLoader()" />
                </p:commandButton>
            </h:form>
            
            <!-- Footer do login -->
            <div class="login-footer">
                <div class="footer-links">
                    <h:link value="Sobre o Sistema" styleClass="footer-link" />
                    <span class="separator">•</span>
                    <h:link value="Ajuda" styleClass="footer-link" />
                    <span class="separator">•</span>
                    <h:link value="Contato" styleClass="footer-link" />
                </div>
                <p class="copyright">© 2025 Sistema Segue-me. Todos os direitos reservados.</p>
            </div>
        </div>
        
        <!-- Loader para login -->
        <div id="loginLoader" class="login-loader" style="display: none;">
            <div class="loader-spinner">
                <svg class="svg-spinner" width="32" height="32" viewBox="0 0 50 50" style="vertical-align: middle;"><circle cx="25" cy="25" r="20" fill="none" stroke="#1976d2" stroke-width="5" stroke-linecap="round" stroke-dasharray="31.4 31.4" transform="rotate(-90 25 25)"><animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/></circle></svg>
            </div>
            <span>Autenticando...</span>
        </div>
    </div>

    <script>
        //<![CDATA[
        function showLoginLoader() {
            document.getElementById('loginLoader').style.display = 'flex';
            document.getElementById('loginCard').style.opacity = '0.7';
        }
        
        function hideLoginLoader() {
            document.getElementById('loginLoader').style.display = 'none';
            document.getElementById('loginCard').style.opacity = '1';
        }
        
        function showGlobalLoader() {
            document.getElementById('globalLoader').style.display = 'flex';
        }
        
        function hideGlobalLoader() {
            document.getElementById('globalLoader').style.display = 'none';
        }
        
        // Animação de entrada da página
        document.addEventListener('DOMContentLoaded', function() {
            // Simular carregamento inicial
            showGlobalLoader();
            
            setTimeout(function() {
                hideGlobalLoader();
                document.querySelector('.login-card').classList.add('animate-in');
            }, 800);
            
            // Adicionar validação de formulário
            const form = document.getElementById('loginForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    const username = document.getElementById('loginForm:username');
                    const password = document.getElementById('loginForm:password');
                    
                    if (!username.value.trim() || !password.value.trim()) {
                        e.preventDefault();
                        return false;
                    }
                });
            }
            
            // Adicionar efeitos de focus nos inputs
            const inputs = document.querySelectorAll('.login-input');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.closest('.input-wrapper').classList.add('focused');
                });
                
                input.addEventListener('blur', function() {
                    this.closest('.input-wrapper').classList.remove('focused');
                });
            });
        });
        
        // Adicionar tema escuro baseado na preferência do sistema
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.classList.add('dark-mode');
        }
        
        // Detectar mudanças na preferência de tema
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (e.matches) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        });
        //]]>
    </script>

</h:body>
</html>
