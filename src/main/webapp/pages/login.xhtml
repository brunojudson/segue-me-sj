<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui" lang="pt-BR" xml:lang="pt-BR">

<h:head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login - Segue-me</title>
	<h:outputScript library="primefaces" name="jquery/jquery.js" />
	<link href="favicon.ico" rel="shortcut icon" />
	
	<style>
body {
	background-color: #e9f1f7;
	font-family: Arial, sans-serif;
}

.login-container {
	max-width: 430px;
	margin: 120px auto;
	padding: 30px;
	background: #ffffff;
	border-radius: 10px;
	box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
}

.login-header {
	text-align: center;
	margin-bottom: 25px;
}

.login-header h1 {
	color: #0056b3;
	font-size: 26px;
	margin: 0;
}

.login-header p {
	color: #6c757d;
	font-size: 14px;
}

.login-footer {
	text-align: center;
	margin-top: 20px;
	font-size: 12px;
	color: #6c757d;
}

.custom-input {
	width: 100%;
	margin-bottom: 15px;
	padding: 10px;
	border: 1px solid #ced4da;
	border-radius: 5px;
	font-size: 14px;
	box-sizing: border-box;
}

.custom-input:focus {
	border-color: #007bff;
	outline: none;
	box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
}

.custom-button {
	width: 100%;
	background-color: #007bff;
	color: #ffffff;
	border: none;
	padding: 10px;
	border-radius: 5px;
	font-size: 16px;
	cursor: pointer;
	margin-top: 10px;
}

.custom-button:hover {
	background-color: #0056b3;
}

.input-group {
	display: flex;
	flex-direction: column;
	align-items: center;
}
</style>
</h:head>
<h:body>
	<div class="login-container">
		<!-- <div class="login-header">
			<h1>Bem-vindo ao Segue-me-sj</h1>
			<p>Faça login para acessar o sistema</p>
		</div> -->
		<h:form>
			<p:tooltip />


			<p:focus for="username" />
			<p:panel style="border: none; box-shadow: none;">
			<p:messages id="messages" showDetail="true" closable="true" />
				<div class="input-group">
					<p:inputText id="username" value="#{loginController.email}" placeholder="Usuário" styleClass="custom-input" />
					<p:password id="password" value="#{loginController.senha}" placeholder="Senha" styleClass="custom-input" />
					<p:commandButton value="Entrar" action="#{loginController.login}"
						icon="pi pi-sign-in" styleClass="custom-button" update="messages"/>
				</div>
			</p:panel>
		</h:form>
		<div class="login-footer">
			<p>2025 Segue-me-sj. Todos os direitos reservados.</p>
		</div>
	</div>
</h:body>
</html>
