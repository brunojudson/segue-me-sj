<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      lang="pt-BR" xml:lang="pt-BR">

<ui:composition template="/templates/template.xhtml">
    <ui:define name="title">Visualizar Movimento Financeiro - Sistema Segue-me</ui:define>

    <ui:define name="content">
        <div class="content-container">
            <!-- Cabeçalho -->
            <div class="page-header">
                <div class="page-header-content">
                    <div class="page-title-section">
                        <h1 class="page-title">
                            <i class="pi pi-wallet page-icon"></i>
                            <span class="title-text">Detalhes do Movimento Financeiro</span>
                        </h1>
                        <p class="page-subtitle">Visualize os dados completos do movimento</p>
                    </div>
                </div>
            </div>

            <h:form id="viewForm">
                <f:metadata>
                    <f:viewParam name="id" />
                    <f:viewAction action="#{movimentoFinanceiroController.carregarMovimento}" />
                </f:metadata>

                <p:growl id="messages" showDetail="true" closable="true">
                    <p:autoUpdate />
                </p:growl>

                <div class="view-card anim-fade-in">
                    <!-- Header do card com tipo -->
                    <div class="view-header">
                        <h2>
                            <h:outputText value="#{movimentoFinanceiroController.movimento.descricao}" />
                        </h2>
                        <div class="view-header-badges">
                            <span class="tipo-badge-lg tipo-#{movimentoFinanceiroController.movimento.tipo}">
                                <i class="pi #{movimentoFinanceiroController.movimento.tipo == 'RECEITA' ? 'pi-arrow-up' : 'pi-arrow-down'}"></i>
                                <h:outputText value="#{movimentoFinanceiroController.movimento.tipo.descricao}" />
                            </span>
                            <span class="categoria-badge-lg">
                                <h:outputText value="#{movimentoFinanceiroController.movimento.categoria.descricao}" />
                            </span>
                        </div>
                    </div>

                    <!-- Dados -->
                    <div class="view-info-grid">
                        <div class="info-item">
                            <label>Valor</label>
                            <span class="valor-destaque valor-#{movimentoFinanceiroController.movimento.tipo}">
                                R$ <h:outputText value="#{movimentoFinanceiroController.movimento.valor}">
                                    <f:convertNumber pattern="#,##0.00" locale="pt_BR" />
                                </h:outputText>
                            </span>
                        </div>

                        <div class="info-item">
                            <label>Data do Movimento</label>
                            <span>
                                <h:outputText value="#{movimentoFinanceiroController.movimento.dataMovimento}">
                                    <f:convertDateTime type="localDate" pattern="dd/MM/yyyy" />
                                </h:outputText>
                            </span>
                        </div>

                        <div class="info-item">
                            <label>Encontro</label>
                            <span class="encontro-tag">
                                <i class="pi pi-calendar"></i>
                                <h:outputText value="#{movimentoFinanceiroController.movimento.encontro.nome}" />
                            </span>
                        </div>

                        <div class="info-item">
                            <label>Responsável</label>
                            <span>
                                <h:outputText value="#{movimentoFinanceiroController.movimento.responsavel}" 
                                    rendered="#{not empty movimentoFinanceiroController.movimento.responsavel}" />
                                <h:outputText value="Não informado"
                                    rendered="#{empty movimentoFinanceiroController.movimento.responsavel}"
                                    styleClass="empty-value" />
                            </span>
                        </div>

                        <div class="info-item">
                            <label>Comprovante</label>
                            <span>
                                <h:outputLink value="#{movimentoFinanceiroController.movimento.comprovanteUrl}"
                                    target="_blank"
                                    rendered="#{not empty movimentoFinanceiroController.movimento.comprovanteUrl}">
                                    <i class="pi pi-external-link"></i> Ver comprovante
                                </h:outputLink>
                                <h:outputText value="Não informado"
                                    rendered="#{empty movimentoFinanceiroController.movimento.comprovanteUrl}"
                                    styleClass="empty-value" />
                            </span>
                        </div>

                        <div class="info-item">
                            <label>Data de Criação</label>
                            <span>
                                <h:outputText value="#{movimentoFinanceiroController.movimento.dataCriacao}">
                                    <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm" />
                                </h:outputText>
                            </span>
                        </div>

                        <div class="info-item full-width"
                            rendered="#{not empty movimentoFinanceiroController.movimento.observacoes}">
                            <label>Observações</label>
                            <span>
                                <h:outputText value="#{movimentoFinanceiroController.movimento.observacoes}" />
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Ações -->
                <div class="view-action-buttons anim-fade-in-d2">
                    <p:button outcome="/pages/financeiro/cadastro.xhtml"
                        value="Editar" icon="pi pi-pencil"
                        styleClass="ui-button-warning"
                        aria-label="Editar este movimento financeiro">
                        <f:param name="id" value="#{movimentoFinanceiroController.movimento.id}" />
                    </p:button>
                    <p:button value="Voltar" outcome="/pages/financeiro/lista.xhtml"
                        icon="pi pi-arrow-left" styleClass="ui-button-secondary"
                        aria-label="Voltar para lista de movimentos" />
                </div>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
</html>
