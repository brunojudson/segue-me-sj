<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      lang="pt-BR" xml:lang="pt-BR">

<ui:define name="title">Visualizar Dirigente - #{dirigenteController.dirigente.trabalhador.pessoa.nome}</ui:define>

<ui:composition template="/templates/template.xhtml">
    <ui:define name="content">
        <div class="content-container page-enter">
            <h:form id="visualizarForm">
                <f:metadata>
                    <f:viewParam name="id" />
                    <f:viewAction action="#{dirigenteController.carregarDirigente}" if="#{not empty param.id}" />
                </f:metadata>

                <!-- Header -->
                <div class="detail-page-header anim-fade-in">
                    <div class="detail-header-left">
                        <p:link outcome="/pages/dirigente/lista.xhtml" styleClass="btn-icon" title="Voltar">
                            <i class="pi pi-arrow-left"></i>
                        </p:link>
                        <div>
                            <h1><i class="pi pi-star page-icon"></i>
                                <h:outputText value="#{dirigenteController.dirigente.trabalhador.pessoa.nome}"
                                              rendered="#{not empty dirigenteController.dirigente.trabalhador.pessoa.nome}" />
                                <h:outputText value="Dirigente sem nome"
                                              rendered="#{empty dirigenteController.dirigente.trabalhador.pessoa.nome}" />
                            </h1>
                            <p class="subtitle">
                                <h:outputText value="Pasta: #{dirigenteController.dirigente.pasta.nome}"
                                              rendered="#{not empty dirigenteController.dirigente.pasta.nome}" />
                                <h:outputText value="Sem pasta definida"
                                              rendered="#{empty dirigenteController.dirigente.pasta.nome}" />
                            </p>
                        </div>
                    </div>
                    <div class="detail-header-right">
                        <h:panelGroup rendered="#{dirigenteController.dirigente.statusMandato eq 'ATIVO'}">
                            <span class="sm-tag sm-tag-green">Ativo</span>
                        </h:panelGroup>
                        <h:panelGroup rendered="#{dirigenteController.dirigente.statusMandato eq 'PRORROGADO'}">
                            <span class="sm-tag sm-tag-blue">Prorrogado</span>
                        </h:panelGroup>
                        <h:panelGroup rendered="#{dirigenteController.dirigente.statusMandato eq 'RENUNCIADO'}">
                            <span class="sm-tag sm-tag-red">Renunciado</span>
                        </h:panelGroup>
                        <h:panelGroup rendered="#{dirigenteController.dirigente.statusMandato eq 'DESTITUIDO'}">
                            <span class="sm-tag sm-tag-red">Destituído</span>
                        </h:panelGroup>
                        <h:panelGroup rendered="#{dirigenteController.dirigente.statusMandato eq 'ENCERRADO_NATURAL' or dirigenteController.dirigente.statusMandato eq 'ENCERRADO_OUTROS'}">
                            <span class="sm-tag sm-tag-red">Encerrado</span>
                        </h:panelGroup>
                        <p:button value="Editar" outcome="/pages/dirigente/cadastro.xhtml"
                                  icon="pi pi-pencil" styleClass="action-button-primary">
                            <f:param name="id" value="#{dirigenteController.dirigente.id}" />
                        </p:button>
                    </div>
                </div>

                <!-- Informações -->
                <div class="detail-grid">
                    <!-- Informações Básicas -->
                    <div class="detail-section anim-fade-in-d1">
                        <h3 class="detail-section-title"><i class="pi pi-info-circle"></i> Informações Básicas</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <label>ID</label>
                                <span>#{dirigenteController.dirigente.id}</span>
                            </div>
                            <div class="info-item">
                                <label>Trabalhador</label>
                                <span>
                                    <h:outputText value="#{dirigenteController.dirigente.trabalhador.pessoa.nome}"
                                                  rendered="#{not empty dirigenteController.dirigente.trabalhador.pessoa.nome}" />
                                    <h:outputText value="Não informado" styleClass="empty-value"
                                                  rendered="#{empty dirigenteController.dirigente.trabalhador.pessoa.nome}" />
                                </span>
                            </div>
                            <div class="info-item">
                                <label>Equipe</label>
                                <span>
                                    <h:outputText value="#{dirigenteController.dirigente.trabalhador.equipe.nome}"
                                                  rendered="#{not empty dirigenteController.dirigente.trabalhador.equipe.nome}" />
                                    <h:outputText value="Não informada" styleClass="empty-value"
                                                  rendered="#{empty dirigenteController.dirigente.trabalhador.equipe.nome}" />
                                </span>
                            </div>
                            <div class="info-item">
                                <label>Pasta</label>
                                <span>
                                    <h:outputText value="#{dirigenteController.dirigente.pasta.nome}"
                                                  rendered="#{not empty dirigenteController.dirigente.pasta.nome}" />
                                    <h:outputText value="Não informada" styleClass="empty-value"
                                                  rendered="#{empty dirigenteController.dirigente.pasta.nome}" />
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Período do Mandato -->
                    <div class="detail-section anim-fade-in-d2">
                        <h3 class="detail-section-title"><i class="pi pi-calendar"></i> Período do Mandato</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <label>Data de Início</label>
                                <span>
                                    <h:outputText value="#{dirigenteController.dirigente.dataInicio}"
                                                  rendered="#{not empty dirigenteController.dirigente.dataInicio}">
                                        <f:converter converterId="localDateConverter" />
                                    </h:outputText>
                                    <h:outputText value="Não informada" styleClass="empty-value"
                                                  rendered="#{empty dirigenteController.dirigente.dataInicio}" />
                                </span>
                            </div>
                            <div class="info-item">
                                <label>Data de Fim Prevista</label>
                                <span>
                                    <h:outputText value="#{dirigenteController.dirigente.dataFim}"
                                                  rendered="#{not empty dirigenteController.dirigente.dataFim}">
                                        <f:converter converterId="localDateConverter" />
                                    </h:outputText>
                                    <h:outputText value="Em exercício" styleClass="empty-value"
                                                  rendered="#{empty dirigenteController.dirigente.dataFim}" />
                                </span>
                            </div>
                            <div class="info-item">
                                <label>Duração</label>
                                <span>
                                    <h:outputText value="#{dirigenteController.dirigente.calcularDuracaoMandato()} dias"
                                                  rendered="#{dirigenteController.dirigente.calcularDuracaoMandato() gt 0}" />
                                    <h:outputText value="Não calculável" styleClass="empty-value"
                                                  rendered="#{dirigenteController.dirigente.calcularDuracaoMandato() le 0}" />
                                </span>
                            </div>
                            <div class="info-item">
                                <label>Status do Mandato</label>
                                <span>
                                    <h:outputText value="#{dirigenteController.dirigente.statusMandato.descricao}"
                                                  rendered="#{not empty dirigenteController.dirigente.statusMandato}" />
                                    <h:outputText value="Não definido" styleClass="empty-value"
                                                  rendered="#{empty dirigenteController.dirigente.statusMandato}" />
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Prorrogação (se aplicável) -->
                    <h:panelGroup rendered="#{dirigenteController.dirigente.prorrogado}">
                        <div class="detail-section anim-fade-in-d2">
                            <h3 class="detail-section-title"><i class="pi pi-history"></i> Prorrogação</h3>
                            <div class="info-grid">
                                <div class="info-item">
                                    <label>Mandato Prorrogado</label>
                                    <span>
                                        <span class="status-badge aguardando" style="font-size:0.85rem;">
                                            <i class="pi pi-check"></i> Sim
                                        </span>
                                    </span>
                                </div>
                                <div class="info-item">
                                    <label>Data da Prorrogação</label>
                                    <span>
                                        <h:outputText value="#{dirigenteController.dirigente.dataProrrogacao}"
                                                      rendered="#{not empty dirigenteController.dirigente.dataProrrogacao}">
                                            <f:converter converterId="localDateConverter" />
                                        </h:outputText>
                                        <h:outputText value="Não informada" styleClass="empty-value"
                                                      rendered="#{empty dirigenteController.dirigente.dataProrrogacao}" />
                                    </span>
                                </div>
                            </div>
                        </div>
                    </h:panelGroup>

                    <!-- Encerramento (se aplicável) -->
                    <h:panelGroup rendered="#{not empty dirigenteController.dirigente.statusMandato and dirigenteController.dirigente.statusMandato.encerrado}">
                        <div class="detail-section anim-fade-in-d2">
                            <h3 class="detail-section-title"><i class="pi pi-times-circle"></i> Encerramento</h3>
                            <div class="info-grid">
                                <div class="info-item">
                                    <label>Data de Encerramento</label>
                                    <span>
                                        <h:outputText value="#{dirigenteController.dirigente.dataEncerramentoEfetivo}"
                                                      rendered="#{not empty dirigenteController.dirigente.dataEncerramentoEfetivo}">
                                            <f:converter converterId="localDateConverter" />
                                        </h:outputText>
                                        <h:outputText value="Não informada" styleClass="empty-value"
                                                      rendered="#{empty dirigenteController.dirigente.dataEncerramentoEfetivo}" />
                                    </span>
                                </div>
                                <div class="info-item">
                                    <label>Motivo</label>
                                    <span>
                                        <h:outputText value="#{dirigenteController.dirigente.motivoEncerramento.descricao}"
                                                      rendered="#{not empty dirigenteController.dirigente.motivoEncerramento}" />
                                        <h:outputText value="Não informado" styleClass="empty-value"
                                                      rendered="#{empty dirigenteController.dirigente.motivoEncerramento}" />
                                    </span>
                                </div>
                            </div>
                        </div>
                    </h:panelGroup>

                    <!-- Observações e Cadastro -->
                    <div class="detail-section anim-fade-in-d3">
                        <h3 class="detail-section-title"><i class="pi pi-file"></i> Informações Adicionais</h3>
                        <div class="info-grid">
                            <div class="info-item full-width">
                                <label>Observações</label>
                                <span>
                                    <h:outputText value="#{dirigenteController.dirigente.observacoes}"
                                                  rendered="#{not empty dirigenteController.dirigente.observacoes}" />
                                    <h:outputText value="Sem observações" styleClass="empty-value"
                                                  rendered="#{empty dirigenteController.dirigente.observacoes}" />
                                </span>
                            </div>
                            <div class="info-item">
                                <label>Data de Cadastro</label>
                                <span>
                                    <h:outputText value="#{dirigenteController.dirigente.dataCadastro}"
                                                  rendered="#{not empty dirigenteController.dirigente.dataCadastro}">
                                        <f:converter converterId="localDateTimeConverter" />
                                    </h:outputText>
                                    <h:outputText value="Não informada" styleClass="empty-value"
                                                  rendered="#{empty dirigenteController.dirigente.dataCadastro}" />
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Ações -->
                <div class="view-action-buttons anim-fade-in-d3">
                    <p:button value="Editar" outcome="/pages/dirigente/cadastro.xhtml"
                              icon="pi pi-pencil" styleClass="ui-button-warning">
                        <f:param name="id" value="#{dirigenteController.dirigente.id}" />
                    </p:button>
                    <p:button value="Voltar" outcome="/pages/dirigente/lista.xhtml"
                              icon="pi pi-arrow-left" styleClass="ui-button-secondary" />
                </div>
            </h:form>
        </div>
    </ui:define>
</ui:composition>

</html>
