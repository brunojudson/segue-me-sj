<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="/templates/template.xhtml">
    <ui:define name="content">
        <div class="content-container">
            <div class="form-container">
                <h2 class="form-title">Detalhes do Dirigente</h2>

                <h:form id="visualizarForm">
                    <f:metadata>
                        <f:viewParam name="id" />
                        <f:viewAction action="#{dirigenteController.carregarDirigente}" if="#{not empty param.id}" />
                    </f:metadata>

                    <p:panelGrid columns="2" layout="grid" styleClass="ui-panelgrid-blank ui-fluid"
                                 columnClasses="ui-grid-col-4, ui-grid-col-8">

                        <p:outputLabel value="ID:" />
                        <h:outputText value="#{dirigenteController.dirigente.id}" />

                        <p:outputLabel value="Trabalhador:" />
                        <h:outputText value="#{dirigenteController.dirigente.trabalhador.pessoa.nome}" />

                        <p:outputLabel value="Equipe:" />
                        <h:outputText value="#{dirigenteController.dirigente.trabalhador.equipe.nome}" />

                        <p:outputLabel value="Pasta:" />
                        <h:outputText value="#{dirigenteController.dirigente.pasta.nome}" />

                        <p:outputLabel value="Data de Início:" />
                        <h:outputText value="#{dirigenteController.dirigente.dataInicio}">
                           <f:converter converterId="localDateConverter" />
                        </h:outputText>

                        <p:outputLabel value="Data de Fim:" />
                        <h:outputText value="#{dirigenteController.dirigente.dataFim}">
                            <f:converter converterId="localDateConverter" />
                        </h:outputText>

                        <p:outputLabel value="Duração do Mandato:" />
                        <h:outputText value="#{dirigenteController.dirigente.calcularDuracaoMandato()} dias" />

                        <p:outputLabel value="Observações:" />
                        <h:outputText value="#{dirigenteController.dirigente.observacoes}" />

                        <p:outputLabel value="Status:" />
                        <h:outputText value="#{dirigenteController.dirigente.ativo ? 'Ativo' : 'Inativo'}" />

                        <p:outputLabel value="Data de Cadastro:" />
                        <h:outputText value="#{dirigenteController.dirigente.dataCadastro}">
                            <f:converter converterId="localDateTimeConverter" />
                        </h:outputText>
                    </p:panelGrid>

                    <div class="form-buttons">
                        <p:button value="Editar" outcome="/pages/dirigente/cadastro.xhtml" icon="pi pi-pencil" styleClass="ui-button-warning">
                            <f:param name="id" value="#{dirigenteController.dirigente.id}" />
                        </p:button>

                        <p:button value="Voltar" outcome="/pages/dirigente/lista.xhtml" icon="pi pi-arrow-left"
                                  styleClass="ui-button-secondary" />
                    </div>
                </h:form>
            </div>
        </div>
    </ui:define>
</ui:composition>

</html>
