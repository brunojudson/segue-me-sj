<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition>
    <div class="header-container">
    	<p:tooltip/>
        <div class="logo">
            <h:link outcome="/pages/index.xhtml">
                <h:graphicImage name="images/logo.png" alt="Logo Segue-me" styleClass="logo-img" rendered="false"/>
                <!-- <h1>Segue-me-SJ</h1> -->
            </h:link> 
        </div>
        <div class="user-info">
            <p:outputPanel><!--  rendered="#{not empty loginController.usuarioLogado" -->
                <span>Bem-vindo, #{loginController.usuarioLogado.nome eq 'Admin' ? 'Administador' : 'Usuário'}</span>
                <p:commandButton id="buttonSair" action="#{loginController.logout}" icon="pi pi-sign-out" styleClass="rounded-button"/>
                <p:tooltip for="buttonSair" value="Sair" showEffect="fade" hideEffect="fade" position="bottom"/>
            </p:outputPanel>
        </div>
    </div>
</ui:composition>

</html>
