<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:cc="http://xmlns.jcp.org/jsf/composite">

<cc:interface>
    <cc:attribute name="icon" default="pi-inbox" type="java.lang.String" 
                  shortDescription="Ícone do PrimeIcons a ser exibido (sem o prefixo 'pi')" />
    <cc:attribute name="title" default="Nenhum registro encontrado" type="java.lang.String" 
                  shortDescription="Título da mensagem de estado vazio" />
    <cc:attribute name="message" default="Não há dados para exibir no momento" type="java.lang.String" 
                  shortDescription="Mensagem descritiva do estado vazio" />
    <cc:attribute name="actionLabel" type="java.lang.String" required="false"
                  shortDescription="Texto do botão de ação (opcional)" />
    <cc:attribute name="actionOutcome" type="java.lang.String" required="false"
                  shortDescription="URL de destino do botão de ação (opcional)" />
    <cc:attribute name="actionIcon" default="pi-plus" type="java.lang.String" 
                  shortDescription="Ícone do botão de ação" />
</cc:interface>

<cc:implementation>
    <div class="empty-state">
        <div class="empty-state-icon">
            <i class="pi #{cc.attrs.icon}" aria-hidden="true"></i>
        </div>
        <h3 class="empty-state-title">#{cc.attrs.title}</h3>
        <p class="empty-state-message">#{cc.attrs.message}</p>
        
        <h:panelGroup rendered="#{not empty cc.attrs.actionLabel and not empty cc.attrs.actionOutcome}">
            <div class="empty-state-action">
                <p:button value="#{cc.attrs.actionLabel}" 
                          outcome="#{cc.attrs.actionOutcome}" 
                          icon="pi #{cc.attrs.actionIcon}"
                          styleClass="action-button-primary" />
            </div>
        </h:panelGroup>
    </div>
</cc:implementation>

</html>
